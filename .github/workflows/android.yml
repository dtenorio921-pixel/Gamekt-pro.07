name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Rename APK
      # Renomeia o arquivo padrão para o nome desejado
      run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/Game-kt Pro.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Game-kt-Pro-V06  # Aqui fica a versão do repositório para você se organizar
        path: "app/build/outputs/apk/debug/Game-kt Pro.apk"
        
